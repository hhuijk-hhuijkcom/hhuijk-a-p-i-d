name: Fetch Steam Data from API

on:
  schedule:
    - cron: "0 0 * * 0"  # 每周日 UTC 0:00 执行一次
  workflow_dispatch:
    inputs:
      force_update:
        description: "强制更新（即使数据没变化）"
        required: false
        default: false
        type: boolean

jobs:
  fetch-data:
    name: Fetch and update Steam data
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch Steam AppID data
        id: fetch
        run: |
          echo "开始获取 Steam 数据..."
          
          # 创建一个临时脚本直接从 API 获取数据
          cat > fetch.js << 'EOF'
          const https = require('https');
          const fs = require('fs');
          const path = require('path');

          console.log('开始从 Steam API 获取数据...');

          async function fetchAll() {
              let allApps = [];
              let lastAppid = 0;
              let hasMore = true;
              let page = 0;

              while (hasMore) {
                  console.log(`正在获取第 ${++page} 页...`);
                  
                  const data = await new Promise((resolve, reject) => {
                      const options = {
                          hostname: 'api.steampowered.com',
                          path: `/IStoreService/GetAppList/v1/?key=0&include_dlc=true&include_software=true&include_videos=true&include_hardware=true&max_results=50000&last_appid=${lastAppid}`,
                          headers: { 'User-Agent': 'GitHub Action' },
                          timeout: 30000
                      };

                      https.get(options, (res) => {
                          let data = '';
                          res.on('data', chunk => data += chunk);
                          res.on('end', () => resolve(data));
                      }).on('error', reject);
                  });

                  const json = JSON.parse(data);
                  if (!json.response || !json.response.apps) break;

                  allApps = allApps.concat(json.response.apps);
                  hasMore = json.response.have_more;
                  
                  if (hasMore) {
                      lastAppid = json.response.apps[json.response.apps.length - 1].appid;
                  }
                  
                  console.log(`已获取 ${allApps.length} 个应用`);
              }

              // 分离游戏和 DLC（简单判断）
              const games = allApps.filter(app => app.name && !app.name.includes('DLC') && !app.name.includes('Soundtrack'));
              const dlc = allApps.filter(app => app.name && (app.name.includes('DLC') || app.name.includes('Soundtrack')));

              // 保存 JSON 文件
              fs.writeFileSync('games_appid.json', JSON.stringify(games, null, 2));
              fs.writeFileSync('dlc_appid.json', JSON.stringify(dlc, null, 2));

              // 保存纯 appid.txt
              const allAppids = [...new Set(allApps.map(a => a.appid))].sort((a, b) => a - b);
              fs.writeFileSync('appid.txt', allAppids.join('\n'));

              console.log(`\n完成！游戏: ${games.length}, DLC: ${dlc.length}, 总 AppID: ${allAppids.length}`);
          }

          fetchAll().catch(e => { console.error(e); process.exit(1); });
          EOF

          node fetch.js

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          author_name: "github-actions[bot]"
          author_email: "github-actions[bot]@users.noreply.github.com"
          message: "Update Steam AppID data from API"
          add: |
            games_appid.json
            dlc_appid.json
            appid.txt

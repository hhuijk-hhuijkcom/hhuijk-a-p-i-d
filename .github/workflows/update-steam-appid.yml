name: Update Steam AppID List

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update:
    name: Update Steam AppID Data
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch Steam AppID from API
        uses: actions/github-script@v7
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        with:
          script: |
            const https = require('https');
            const fs = require('fs');

            const apiKey = process.env.STEAM_API_KEY;
            
            if (!apiKey) {
                console.error('❌ 没有找到 STEAM_API_KEY！');
                process.exit(1);
            }

            console.log('开始从 Steam API 获取 AppID...\n');

            async function fetchPage(lastAppid) {
                return new Promise((resolve, reject) => {
                    const options = {
                        hostname: 'api.steampowered.com',
                        path: `/IStoreService/GetAppList/v1/?key=${apiKey}&include_dlc=true&include_software=true&include_videos=true&include_hardware=true&max_results=50000&last_appid=${lastAppid}`,
                        headers: { 'User-Agent': 'GitHub Action' },
                        timeout: 30000
                    };
                    
                    https.get(options, (res) => {
                        let data = '';
                        res.on('data', chunk => data += chunk);
                        res.on('end', () => resolve(data));
                    }).on('error', reject);
                });
            }

            async function fetchAll() {
                let allApps = [];
                let lastAppid = 0;
                let hasMore = true;
                let page = 0;

                while (hasMore) {
                    console.log(`正在获取第 ${++page} 页...`);
                    
                    const data = await fetchPage(lastAppid);
                    const json = JSON.parse(data);
                    
                    if (!json.response || !json.response.apps) break;

                    allApps = allApps.concat(json.response.apps);
                    hasMore = json.response.have_more_results;
                    
                    if (hasMore) {
                        lastAppid = json.response.apps[json.response.apps.length - 1].appid;
                    }
                    
                    console.log(`已获取 ${allApps.length} 个应用`);
                }

                const allAppids = [...new Set(allApps.map(a => a.appid))].sort((a, b) => a - b);
                fs.writeFileSync('appid.txt', allAppids.join('\n'));
                console.log(`\n完成！总共 ${allAppids.length} 个 AppID`);
            }

            await fetchAll();

      - name: Commit and push changes
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions[bot]
          author_email: github-actions[bot]@users.noreply.github.com
          message: "Update Steam AppID data"
          add: appid.txt

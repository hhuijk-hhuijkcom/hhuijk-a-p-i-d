name: Update Steam AppID List

# 触发条件
on:
  # 定时触发（使用 cron 语法）
  schedule:
    - cron: "0 0 * * *"  # 每天 UTC 0:00 执行一次
  # 手动触发（方便测试）
  workflow_dispatch:
  # 也可以在代码推送时触发（可选）
  push:
    branches:
      - main

# 任务
jobs:
  update:
    name: Update Steam AppID Data
    runs-on: ubuntu-latest  # 使用最新的 Ubuntu 系统

    steps:
      # Step 1: 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Step 3: 从现有的 JSON 文件生成 appid.txt
      - name: Generate appid.txt from JSON
        run: |
          cat > generate.js << 'EOF'
          const fs = require('fs');
          const path = require('path');
          
          console.log('开始处理...');
          
          let allAppids = [];
          
          if (fs.existsSync('games_appid.json')) {
              const games = JSON.parse(fs.readFileSync('games_appid.json', 'utf-8'));
              allAppids = allAppids.concat(games.map(g => g.appid));
              console.log('读取到 ' + games.length + ' 个游戏');
          }
          
          if (fs.existsSync('dlc_appid.json')) {
              const dlc = JSON.parse(fs.readFileSync('dlc_appid.json', 'utf-8'));
              allAppids = allAppids.concat(dlc.map(d => d.appid));
              console.log('读取到 ' + dlc.length + ' 个 DLC');
          }
          
          const uniqueAppids = [...new Set(allAppids)].sort((a, b) => a - b);
          fs.writeFileSync('appid.txt', uniqueAppids.join('\n'));
          
          console.log('完成！总共 ' + uniqueAppids.length + ' 个 AppID');
          EOF
          
          node generate.js

      # Step 4: 提交和推送更改
      - name: Commit and push changes
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions[bot]
          author_email: github-actions[bot]@users.noreply.github.com
          message: "Update Steam AppID data"
          add: appid.txt
